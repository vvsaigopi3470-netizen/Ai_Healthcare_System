<!DOCTYPE html>
<html>

<head>

    <title>Generated Reports</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h2 class="mb-4">
        Generated Reports
    </h2>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

        <tr>

            <th>Report ID</th>
            <th>Report Name</th>
            <th>Report Type</th>
            <th>Generated By</th>
            <th>Generated At</th>

        </tr>

        </thead>

        <tbody>

        {% for report in reports %}

        <tr>

            <td>{{ report[0] }}</td>

            <td>{{ report[1] }}</td>

            <td>{{ report[2] }}</td>

            <td>{{ report[3] }}</td>

            <td>{{ report[4] }}</td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

    <a href="/reports_dashboard"
       class="btn btn-primary">

       Back to Dashboard

    </a>

</div>

</body>
</html>
