{% extends "base.html" %}

{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Patient Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#2563eb,#06b6d4);
min-height:100vh;
}

.card-box{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,.15);
}

</style>

</head>

<body>

<div class="container py-5">

<h1 class="text-center text-white mb-5">
🏥 Patient Dashboard
</h1>

<div class="row">

<div class="col-md-4">

<div class="card-box">

<h3>Total Patients</h3>

<h1>{{ total_patients }}</h1>

</div>

</div>

<div class="col-md-4">

<div class="card-box">

<h3>Add Patient</h3>

<a href="/add_patient"
class="btn btn-primary">

Open

</a>

</div>

</div>

<div class="col-md-4">

<div class="card-box">

<h3>Patient List</h3>

<a href="/patients"
class="btn btn-success">

View

</a>

</div>

</div>

</div>

</div>

</body>

</html>

{% endblock %}
