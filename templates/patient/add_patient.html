{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

<div class="glass-card">

<h2 class="mb-4">
🏥 Add New Patient
</h2>

<form method="POST"
enctype="multipart/form-data">

<div class="row">

<div class="col-md-6 mb-3">
<label>Patient Name</label>
<input type="text"
class="form-control"
name="name"
required>
</div>

<div class="col-md-3 mb-3">
<label>Age</label>
<input type="number"
class="form-control"
name="age"
required>
</div>

<div class="col-md-3 mb-3">
<label>Gender</label>
<select class="form-control"
name="gender">

<option>Male</option>
<option>Female</option>
<option>Other</option>

</select>
</div>

<div class="col-md-3 mb-3">
<label>Weight</label>
<input type="number"
class="form-control"
name="weight">
</div>

<div class="col-md-3 mb-3">
<label>Height</label>
<input type="number"
class="form-control"
name="height">
</div>

<div class="col-md-3 mb-3">
<label>Blood Group</label>
<input type="text"
class="form-control"
name="blood_group">
</div>

<div class="col-md-12 mb-3">
<label>Medical History</label>
<textarea class="form-control"
rows="3"
name="medical_history"></textarea>
</div>

<div class="col-md-6 mb-3">
<label>Allergies</label>
<textarea class="form-control"
rows="3"
name="allergies"></textarea>
</div>

<div class="col-md-6 mb-3">
<label>Family History</label>
<textarea class="form-control"
rows="3"
name="family_history"></textarea>
</div>

<div class="col-md-12 mb-3">
<label>Insurance Details</label>
<textarea class="form-control"
rows="3"
name="insurance_details"></textarea>
</div>

<div class="col-md-12 mb-4">
<label>Medical Report</label>
<input type="file"
class="form-control"
name="report">
</div>

</div>

<button class="btn btn-primary btn-lg">
💾 Save Patient
</button>

</form>

</div>

</div>

{% endblock %}
