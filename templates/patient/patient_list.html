```html
<!DOCTYPE html>
<html lang="en">

<head>
{% extends "base.html" %}

{% block content %}

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Patient List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
background:#f4f8fc;
}

.header{
background:linear-gradient(45deg,#2563eb,#06b6d4);
padding:25px;
color:white;
}

.table-container{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
margin-top:20px;
}

.btn-view{
background:#2563eb;
color:white;
}

.btn-delete{
background:#dc3545;
color:white;
}

table{
vertical-align:middle !important;
}

</style>

</head>

<body>

<div class="header">

<h2>
🏥 Patient Management
</h2>

</div>

<div class="container mt-4">

<div class="table-container">

<h3 class="mb-4">
Patient Records
</h3>

<table class="table table-hover">

<thead class="table-primary">

<tr>

<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Actions</th>

</tr>

</thead>

<tbody>

{% for p in patients %}

<tr>

<td>{{ p[0] }}</td>

<td>{{ p[2] }}</td>

<td>{{ p[3] }}</td>

<td>{{ p[4] }}</td>

<td>

<a href="/patient/{{p[0]}}"
class="btn btn-view btn-sm">

View

</a>

<a href="/delete_patient/{{p[0]}}"
class="btn btn-delete btn-sm">

Delete

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>

</html>

{% endblock %}
```
