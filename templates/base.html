```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>
AI Healthcare System
</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
    margin:0;
    background:#f4f8fc;
    font-family:'Segoe UI',sans-serif;
}

.sidebar{
    position:fixed;
    width:260px;
    height:100vh;
    background:linear-gradient(
    180deg,
    #0f172a,
    #1e3a8a,
    #06b6d4
    );
    color:white;
    padding-top:20px;
}

.sidebar h3{
    text-align:center;
    font-weight:bold;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:14px 25px;
    transition:0.3s;
}

.sidebar a:hover{
    background:rgba(255,255,255,.15);
    padding-left:35px;
}

.content{
    margin-left:260px;
    padding:30px;
}

.topbar{
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    margin-bottom:25px;
}

.card-box{
    border:none;
    border-radius:20px;
    color:white;
    padding:20px;
    transition:.4s;
}

.card-box:hover{
    transform:translateY(-8px);
}

.bg1{
background:linear-gradient(45deg,#2563eb,#06b6d4);
}

.bg2{
background:linear-gradient(45deg,#16a34a,#22c55e);
}

.bg3{
background:linear-gradient(45deg,#ea580c,#f97316);
}

.bg4{
background:linear-gradient(45deg,#7c3aed,#a855f7);
}

.table{
background:white;
border-radius:15px;
overflow:hidden;
}

.btn-custom{
background:#2563eb;
color:white;
border:none;
border-radius:10px;
padding:10px 20px;
}

.btn-custom:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>
🏥 Healthcare AI
</h3>

<a href="/admin_dashboard">
<i class="fa fa-chart-line"></i>
Dashboard
</a>

<a href="/patients">
<i class="fa fa-user-injured"></i>
Patients
</a>

<a href="/doctors">
<i class="fa fa-user-doctor"></i>
Doctors
</a>

<a href="/appointments">
<i class="fa fa-calendar"></i>
Appointments
</a>

<a href="/ehr_records">
<i class="fa fa-file-medical"></i>
EHR
</a>

<a href="/predict_disease">
<i class="fa fa-brain"></i>
Disease AI
</a>

<a href="/predict_outcome">
<i class="fa fa-heart-pulse"></i>
Outcome AI
</a>

<a href="/bed_dashboard">
<i class="fa fa-bed"></i>
Beds
</a>

<a href="/staff_dashboard">
<i class="fa fa-users"></i>
Staff
</a>

<a href="/resource_dashboard">
<i class="fa fa-box"></i>
Resources
</a>

<a href="/report_list">
<i class="fa fa-file-pdf"></i>
Reports
</a>

<a href="/chatbot">
<i class="fa fa-robot"></i>
Chatbot
</a>

<a href="/logout">
<i class="fa fa-sign-out-alt"></i>
Logout
</a>

</div>

<div class="content">

<div class="topbar">

<h2>
AI Healthcare Management System
</h2>

</div>

{% block content %}

{% endblock %}

</div>

</body>
</html>
