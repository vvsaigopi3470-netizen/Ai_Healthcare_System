<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | AI Healthcare System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            background:linear-gradient(
            135deg,
            #0d6efd,
            #20c997
            );

            display:flex;
            justify-content:center;
            align-items:center;

            font-family:'Segoe UI',sans-serif;
        }

        .login-container{

            width:100%;
            max-width:450px;

            background:white;

            border-radius:20px;

            overflow:hidden;

            box-shadow:
            0 15px 40px rgba(0,0,0,0.25);
        }

        .login-header{

            background:#0d6efd;

            color:white;

            text-align:center;

            padding:30px;
        }

        .login-header i{

            font-size:55px;

            margin-bottom:10px;
        }

        .login-header h2{

            font-weight:bold;
        }

        .login-body{

            padding:30px;
        }

        .form-control,
        .form-select{

            border-radius:10px;
        }

        .btn-login{

            width:100%;

            border-radius:10px;

            font-size:17px;

            font-weight:600;
        }

        .footer-links{

            text-align:center;

            margin-top:15px;
        }

        .footer-links a{

            text-decoration:none;
        }

        .footer-links a:hover{

            text-decoration:underline;
        }

        .system-title{

            font-size:14px;

            opacity:0.9;
        }

        .input-group button{

            border-radius:0 10px 10px 0;
        }

    </style>

</head>

<body>

<div class="login-container">

    <div class="login-header">

        <i class="fas fa-hospital-user"></i>

        <h2>AI Healthcare System</h2>

        <p class="system-title">

            Healthcare Prediction &
            Resource Management System

        </p>

    </div>

    <div class="login-body">

        <!-- Flash Messages -->

        {% with messages = get_flashed_messages() %}
            {% if messages %}

                {% for message in messages %}

                <div class="alert alert-danger">

                    {{ message }}

                </div>

                {% endfor %}

            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">

            <!-- Email -->

            <div class="mb-3">

                <label class="form-label">

                    Email Address

                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter Email"
                    required>

            </div>

            <!-- Password -->

            <div class="mb-3">

                <label class="form-label">

                    Password

                </label>

                <div class="input-group">

                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter Password"
                        required>

                    <button
                        type="button"
                        class="btn btn-outline-secondary"
                        onclick="togglePassword()">

                        <i class="fa fa-eye"></i>

                    </button>

                </div>

            </div>

            <!-- Role -->

            <div class="mb-3">

                <label class="form-label">

                    Login As

                </label>

                <select
                    class="form-select"
                    name="role"
                    required>

                    <option value="">

                        Select User Type

                    </option>

                    <option value="Patient">

                        Patient

                    </option>

                    <option value="Doctor">

                        Doctor

                    </option>

                    <option value="Admin">

                        Admin

                    </option>

                    <option value="Staff">

                        Hospital Staff

                    </option>

                </select>

            </div>

            <!-- Remember Me -->

            <div class="form-check mb-3">

                <input
                    class="form-check-input"
                    type="checkbox"
                    id="remember">

                <label
                    class="form-check-label"
                    for="remember">

                    Remember Me

                </label>

            </div>

            <!-- Login Button -->

            <button
                type="submit"
                class="btn btn-primary btn-login">

                <i class="fas fa-sign-in-alt"></i>

                Login

            </button>

        </form>

        <div class="footer-links">

            <br>

            <a href="/forgot_password">

                Forgot Password?

            </a>

            <br><br>

            <a href="/register">

                New User? Register Here

            </a>

        </div>

    </div>

</div>

<script>

function togglePassword(){

    let password =
    document.getElementById(
    "password"
    );

    if(password.type === "password")
    {
        password.type = "text";
    }
    else
    {
        password.type = "password";
    }

}

</script>

</body>
</html>
