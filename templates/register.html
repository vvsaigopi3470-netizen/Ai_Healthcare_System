```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Healthcare Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
    background:linear-gradient(
    135deg,
    #4facfe,
    #00f2fe
    );
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.register-card{
    width:450px;
    border:none;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card-header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
    border-radius:20px 20px 0 0;
}

.btn-register{
    width:100%;
    background:#0d6efd;
    color:white;
}

.btn-register:hover{
    background:#084298;
}

.icon{
    font-size:50px;
    margin-bottom:10px;
}

</style>

</head>

<body>

<div class="card register-card">

    <div class="card-header">

        <i class="fa-solid fa-hospital-user icon"></i>

        <h3>Healthcare System</h3>

        <p>User Registration</p>

    </div>

    <div class="card-body p-4">

        {% with messages = get_flashed_messages() %}
        {% if messages %}

        <div class="alert alert-warning">

            {% for message in messages %}
                {{ message }}
            {% endfor %}

        </div>

        {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Full Name
                </label>

                <input
                type="text"
                name="name"
                class="form-control"
                placeholder="Enter Name"
                required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter Email"
                required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter Password"
                required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Select Role
                </label>

                <select
                name="role"
                class="form-select"
                required>

                    <option value="">
                        Choose Role
                    </option>

                    <option value="Patient">
                        Patient
                    </option>

                    <option value="Doctor">
                        Doctor
                    </option>

                    <option value="Admin">
                        Admin
                    </option>

                    <option value="Staff">
                        Staff
                    </option>

                </select>

            </div>

            <button
            type="submit"
            class="btn btn-register">

                <i class="fa-solid fa-user-plus"></i>

                Register

            </button>

        </form>

        <hr>

        <div class="text-center">

            Already have an account?

            <a href="/login">

                Login Here

            </a>

        </div>

    </div>

</div>

</body>
</html>
```
