{% extends "base.html" %}

{% block content %}

<!DOCTYPE html>
<html>

<head>
<title>Outcome History</title>
</head>

<body>

<h1>Outcome Records</h1>

<table border="1">

<tr>

<th>ID</th>
<th>Patient</th>
<th>Recovery</th>
<th>ICU Risk</th>
<th>Risk Level</th>

</tr>

{% for o in outcomes %}

<tr>

<td>{{o[0]}}</td>
<td>{{o[1]}}</td>
<td>{{o[2]}}%</td>
<td>{{o[3]}}%</td>
<td>{{o[6]}}</td>

</tr>

{% endfor %}

</table>

</body>
</html>

{% endblock %}
