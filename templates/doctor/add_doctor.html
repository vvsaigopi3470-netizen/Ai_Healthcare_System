{% extends "base.html" %}

{% block content %}

<!DOCTYPE html>
<html>

<head>
<title>Add Doctor</title>
</head>

<body>

<h2>Add Doctor</h2>

<form method="POST">

<input
type="text"
name="name"
placeholder="Doctor Name"
required>

<br><br>

<input
type="email"
name="email"
placeholder="Email"
required>

<br><br>

<input
type="text"
name="specialization"
placeholder="Specialization"
required>

<br><br>

<input
type="text"
name="department"
placeholder="Department">

<br><br>

<input
type="number"
name="experience"
placeholder="Experience">

<br><br>

<input
type="text"
name="qualification"
placeholder="Qualification">

<br><br>

<input
type="text"
name="phone"
placeholder="Phone">

<br><br>

<textarea
name="available_slots"
placeholder="Mon-Fri 10AM-5PM">
</textarea>

<br><br>

<input
type="number"
step="0.01"
name="consultation_fee"
placeholder="Consultation Fee">

<br><br>

<button type="submit">

Add Doctor

</button>

</form>

</body>
</html>
{% block content %}
