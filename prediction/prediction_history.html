<!DOCTYPE html>
<html>

<head>
<title>Prediction History</title>
</head>

<body>

<h1>Prediction History</h1>

<table border="1">

<tr>

<th>ID</th>
<th>Patient</th>
<th>Disease</th>
<th>Risk</th>
<th>Severity</th>

</tr>

{% for p in predictions %}

<tr>

<td>{{p[0]}}</td>
<td>{{p[1]}}</td>
<td>{{p[2]}}</td>
<td>{{p[3]}}%</td>
<td>{{p[4]}}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
